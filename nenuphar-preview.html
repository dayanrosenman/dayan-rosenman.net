<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: sans-serif; background: #f5f0e8; display: flex; gap: 40px; padding: 60px; align-items: flex-start; flex-wrap: wrap; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .icon-wrap { width: 80px; height: 80px; background: #f5e8e6; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  svg { width: 36px; height: 36px; stroke: #670d00; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  label { font-size: 13px; color: #555; font-weight: 500; }
</style>
</head>
<body>

<!-- Option 6: 3-petal upright minimal -->
<div class="option">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M12 20 C12 14 9 9 12 3"/>
      <path d="M12 20 C12 14 15 9 12 3"/>
      <path d="M12 20 C8 16 5 12 8 7"/>
      <path d="M12 20 C16 16 19 12 16 7"/>
    </svg>
  </div>
  <label>6 — 4-stroke upright</label>
</div>

<!-- Option 7: Side-view water lily, 3 strokes -->
<div class="option">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M12 16 C10 12 8 8 12 4"/>
      <path d="M12 16 C14 12 16 8 12 4"/>
      <path d="M12 16 C9 14 6 13 5 16 Q8 18 12 17 Q16 18 19 16 C18 13 15 14 12 16z"/>
    </svg>
  </div>
  <label>7 — bloom on pad</label>
</div>

<!-- Option 8: Minimal 3-petal tulip-like -->
<div class="option">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M12 19 L12 13"/>
      <path d="M12 13 C12 9 8 6 9 3 C10 5 11 8 12 13"/>
      <path d="M12 13 C12 9 16 6 15 3 C14 5 13 8 12 13"/>
      <path d="M12 13 C9 11 6 12 5 10 C7 9 10 10 12 13"/>
      <path d="M12 13 C15 11 18 12 19 10 C17 9 14 10 12 13"/>
      <path d="M9 19 Q12 17.5 15 19"/>
    </svg>
  </div>
  <label>8 — lotus + stem</label>
</div>

<!-- Option 9: Abstract water lily, 2 curves -->
<div class="option">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M5 15 Q12 5 19 15"/>
      <path d="M7 15 Q12 8 17 15"/>
      <path d="M9 15 Q12 10 15 15"/>
      <path d="M4 16 Q12 20 20 16"/>
    </svg>
  </div>
  <label>9 — arc layers</label>
</div>

<!-- Option 10: Elegant vertical lily, 4 strokes -->
<div class="option">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M12 21 C12 17 10 14 12 10"/>
      <path d="M12 21 C12 17 14 14 12 10"/>
      <path d="M12 10 C11 7 9 5 12 2"/>
      <path d="M12 10 C13 7 15 5 12 2"/>
      <path d="M9 18 Q12 16 15 18"/>
    </svg>
  </div>
  <label>10 — two-layer vertical</label>
</div>

</body>
</html>
