<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #670d00;
      --accent-dark: #3d0800;
      --ink:         #3a3230;
      --ink-light:   #8a7a72;
      --cream:       #f9f5f2;
      --rule:        #e8ddd9;
    }

    /* Screen: center the page with a shadow */
    body {
      background: #d6cfc9;
      font-family: 'DM Sans', Arial, sans-serif;
      color: var(--ink);
      padding: 32px;
    }

    .page {
      width: 8.5in;
      min-height: 11in;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 4px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: var(--cream);
      border-top: 5px solid var(--accent);
      padding: 20px 1in 14px;
    }

    .header-name {
      font-family: 'Lora', Georgia, serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--accent-dark);
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }

    .header-creds {
      font-family: 'Lora', Georgia, serif;
      font-size: 12.5px;
      font-style: italic;
      color: var(--accent);
      margin-bottom: 1px;
    }

    .header-specialty {
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-light);
      margin-top: 6px;
    }

    /* ── Divider ── */
    .header-rule {
      border: none;
      border-top: 1px solid var(--accent);
      margin: 12px 1in 0;
    }

    /* ── Body ── */
    .body {
      flex: 1;
      padding: 0.6in 1in;
      border-top: 1px solid var(--rule);
    }

    .date-line {
      font-size: 13px;
      color: var(--ink-light);
      margin-bottom: 0.45in;
    }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--accent);
      padding: 11px 1in;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 10px;
      color: var(--accent);
      background: var(--cream);
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }
    .footer-item {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      color: var(--accent);
    }
    .footer-item svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .footer-item a { color: var(--accent); text-decoration: none; }

    /* ── Print ── */
    @media print {
      body { background: none; padding: 0; }
      .page {
        width: 100%;
        min-height: 0;
        box-shadow: none;
      }
      .header, .footer {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page {
        size: letter;
        margin: 0;
      }
      /* Re-apply logical padding inside print margins */
      .header    { padding: 20px 1in 14px; }
      .header-rule { margin: 12px 1in 0; }
      .body      { padding: 0.5in 1in; }
      .footer    { padding: 12px 1in; }
    }
  </style>
